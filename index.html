<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价值大师</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#e8ecef;height:100vh;display:flex;justify-content:center;align-items:center;}
.app{background:#fff;width:100%;max-width:900px;height:100vh;max-height:100vh;display:flex;overflow:hidden;}

/* 侧边栏 */
.sidebar{width:220px;flex-shrink:0;border-right:1px solid #eef0f2;display:flex;flex-direction:column;background:#f7f9fa;}
.sidebar-header{padding:22px 18px 16px;}
.brand{font-size:16px;font-weight:500;color:#1a2e3b;}
.brand span{color:#2e6da4;}
.sidebar-body{flex:1;overflow-y:auto;padding:8px 10px 16px;}
.sidebar-body::-webkit-scrollbar{width:3px;}
.sidebar-body::-webkit-scrollbar-thumb{background:#dde2e6;border-radius:2px;}

/* 大师卡片 */
.master-section{margin-bottom:4px;}
.master-btn{width:100%;padding:10px 12px;border-radius:10px;border:none;background:transparent;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;justify-content:space-between;}
.master-btn:hover{background:#edf1f4;}
.master-btn.active{background:#e3edf7;}
.master-btn-name{font-size:13px;font-weight:500;color:#2c3e50;}
.master-btn.active .master-btn-name{color:#1a5276;}
.master-btn-arrow{font-size:10px;color:#bbb;transition:transform 0.2s;}

/* 子对话列表 */
.chat-list{padding-left:12px;margin-bottom:4px;}
.chat-item{width:100%;padding:7px 10px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:inherit;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.chat-item:hover{background:#edf1f4;}
.chat-item.active{background:#e3edf7;}
.chat-item-title{font-size:12px;color:#7f8c8d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.chat-item.active .chat-item-title{color:#1a5276;}
.chat-item-del{opacity:0;font-size:11px;color:#bbb;cursor:pointer;flex-shrink:0;}
.chat-item:hover .chat-item-del{opacity:1;}
.sidebar-divider{height:1px;background:#eef0f2;margin:8px 4px;}

/* 主区域 */
.main{flex:1;display:flex;flex-direction:column;min-width:0;background:#fff;overflow:hidden;}
.main-header{padding:16px 22px;border-bottom:1px solid #f0f2f4;display:flex;align-items:center;gap:12px;}
.menu-btn{width:32px;height:32px;border-radius:50%;background:#1a5276;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;position:fixed;top:14px;left:14px;z-index:99;box-shadow:0 2px 8px rgba(26,82,118,0.3);}
.header-info{flex:1;}
.header-name{font-size:14px;font-weight:500;color:#1a2e3b;}
.header-sub{font-size:11px;color:#aab4bc;margin-top:2px;}
.new-btn{padding:7px 16px;border-radius:20px;border:1px solid #dde4ea;background:#fff;font-size:12px;color:#5d7a8a;cursor:pointer;font-family:inherit;white-space:nowrap;}
.new-btn:hover{border-color:#2e6da4;color:#2e6da4;}

/* 聊天区 */
.chat{flex:1;padding:24px 22px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;min-height:0;}
.chat::-webkit-scrollbar{width:3px;}
.chat::-webkit-scrollbar-thumb{background:#dde2e6;border-radius:2px;}
.row{display:flex;gap:0;align-items:flex-start;flex-direction:column;}
.row.user{align-items:flex-end;}
.name-label{font-size:11px;color:#aab4bc;margin-bottom:5px;padding:0 2px;}
.bubble{padding:12px 16px;font-size:14px;line-height:1.85;border-radius:16px;max-width:78%;}
.bubble.ai{background:#f4f7f9;color:#1a2e3b;border-top-left-radius:4px;}
.bubble.user{background:#1a5276;color:#fff;border-top-right-radius:4px;}
.typing{display:flex;gap:5px;padding:13px 17px;background:#f4f7f9;border-radius:4px 16px 16px 16px;width:fit-content;}
.dot{width:5px;height:5px;border-radius:50%;background:#aab4bc;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

/* 输入区 */
.input-area{padding:14px 22px 22px;border-top:1px solid #f0f2f4;}
.limit-tip{font-size:12px;color:#2e6da4;text-align:center;padding:6px;display:none;}
.input-wrap{display:flex;align-items:center;gap:10px;background:#f4f7f9;border-radius:28px;padding:9px 9px 9px 18px;}
.chat-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:#1a2e3b;font-family:inherit;}
.chat-input::placeholder{color:#c0c8ce;}
.send-btn{width:34px;height:34px;border-radius:50%;background:#1a5276;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{background:#a8c4d8;cursor:not-allowed;}
.disclaimer{font-size:10px;color:#c0c8ce;text-align:center;margin-top:9px;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:10;}
@media(max-width:600px){
  .sidebar{position:fixed;left:0;top:0;height:100%;z-index:20;transform:translateX(-100%);transition:transform 0.3s;}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:flex;}
  .overlay.show{display:block;}
}
/* Profile 页面 */
.profile-page{padding:32px 28px;overflow-y:auto;flex:1;}
.profile-tag{display:inline-block;font-size:11px;color:#2e6da4;background:#e8f1f8;padding:4px 12px;border-radius:20px;margin-bottom:16px;letter-spacing:0.03em;}
.profile-name{font-size:24px;font-weight:500;color:#1a2e3b;margin-bottom:10px;}
.profile-desc{font-size:14px;line-height:1.85;color:#5d7a8a;margin-bottom:28px;}
.profile-section-title{font-size:11px;color:#aab4bc;letter-spacing:0.06em;margin-bottom:12px;}
.profile-principles{display:flex;flex-direction:column;gap:10px;}
.profile-principle{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;background:#f4f7f9;border-radius:10px;font-size:13px;color:#2c3e50;line-height:1.6;}
.profile-principle-dot{width:6px;height:6px;border-radius:50%;background:#2e6da4;flex-shrink:0;margin-top:6px;}
.profile-start-btn{margin-top:28px;padding:12px 24px;border-radius:24px;background:#1a5276;border:none;color:#fff;font-size:14px;cursor:pointer;font-family:inherit;}
.profile-start-btn:hover{background:#154360;}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="app">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">价值大师<span>·</span></div>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
  </div>

<div class="main">
  <div class="chat" id="chat"></div>
  <div class="input-area">
    <div class="limit-tip" id="limitTip">今日提问次数已用完，明天再来</div>
    <div class="input-wrap">
      <input class="chat-input" id="input" type="text" placeholder="向大师提问…" />
      <button class="send-btn" id="sendBtn" onclick="send()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="disclaimer">基于公开资料模拟 · 不构成投资建议</div>
  </div>
</div>

<script>
const DAILY_LIMIT = 20;

const investors = [
  {
    id:'buffett', fullName:'沃伦·巴菲特',
    profile: {
  title: '奥马哈先知',
  desc: '伯克希尔·哈撒韦董事长，全球最成功的投资人之一。从小展现商业天赋，师从价值投资之父本杰明·格雷厄姆，将价值投资发扬光大，连续数十年跑赢市场。',
  principles: ['只投资你能看懂的生意（能力圈）', '寻找拥有持久护城河的企业', '以合理的价格买优秀企业，而非便宜价格买普通企业', '长期持有，最喜欢的持有期是永远', '别人贪婪时恐惧，别人恐惧时贪婪', '第一条规则：不要亏损']
},
    prompt:`你是沃伦·巴菲特，伯克希尔·哈撒韦董事长。根据历年股东信、年会问答及公开访谈回答问题。核心理念：能力圈、护城河、合理价格买优秀企业、长期持有、别人贪婪时恐惧、不亏损是第一原则、专注基本面、管理层诚信最重要。说话风格：通俗比喻，幽默风趣。用中文回答，200字以内，像真实对话，不用列表。`
  },
  {
    id:'duan', fullName:'段永平',
    profile: {
  title: '中国巴菲特',
  desc: '步步高系创始人，OPPO与vivo间接创始人。白手起家将小霸王做到行业第一，后移居美国潜心投资，曾以62万美元竞拍与巴菲特共进午餐。投资苹果、茅台等获得巨额回报。',
  principles: ['投资就是投生意，要真正理解商业模式', '本分：做正确的事，不做错误的事更重要', 'Stop doing list 比 to-do list 更重要', '不懂不投，能力圈之外坚决不碰', '不用杠杆，不看股价，专注企业价值', '犯错了要及时认错止损，不死守']
},
    prompt:`你是段永平，步步高系创始人，价值投资者。根据雪球发帖及公开访谈回答问题。核心理念：投资就是投生意、本分、Stop doing list、只投看懂的、长期持有、不用杠杆、犯错及时止损。说话风格：直接务实，从商业角度看问题。用中文回答，200字以内，像真实对话，不用列表。`
  },
  {
    id:'munger', fullName:'查理·芒格',
    profile: {
  title: '多元思维大师',
  desc: '伯克希尔·哈撒韦副董事长，巴菲特的黄金搭档长达半世纪。律师出身，博览群书，将物理、心理学、数学、经济学等多学科融入投资决策，被誉为"行走的智慧之书"。',
  principles: ['用多元思维模型分析问题，而非单一视角', '反过来想，总是反过来想', '避免愚蠢比追求聪明更重要', '人类有24种认知偏差，投资者要时刻警惕', '集中投资少数真正优秀的企业', '终身学习，每天都要比昨天聪明一点']
},
    prompt:`你是查理·芒格，伯克希尔副董事长。根据《穷查理宝典》及年会问答回答问题。核心理念：多元思维模型、反过来想、人类误判心理学、集中投资、等待好机会、激励机制、终身学习。说话风格：直接犀利，幽默带讽刺，用多学科知识。用中文回答，200字以内，像真实对话，不用列表。`
  },
  {
    id:'lynch', fullName:'彼得·林奇',
    profile: {
  title: '十倍股猎手',
  desc: '富达麦哲伦基金前经理，任职13年间年均回报29%，将基金规模从1800万扩张到140亿美元。他相信普通人比机构更有投资优势，因为好公司往往藏在日常生活里。',
  principles: ['买你了解的——日常生活是最好的选股器', '在机构投资者发现之前找到成长股', 'PEG比率：市盈率除以增长率，小于1为佳', '了解你持有每只股票的故事和原因', '业余投资者比华尔街更早感知消费趋势', '故事变了就是卖出信号，不要死守']
},
    prompt:`你是彼得·林奇，富达麦哲伦基金前经理。根据《彼得·林奇的成功投资》及访谈回答问题。核心理念：买你了解的、日常发现机会、PEG比率、业余投资者有优势、定期检查持仓故事。说话风格：热情平易，充满具体案例。用中文回答，200字以内，像真实对话，不用列表。`
  },
  {
    id:'graham', fullName:'本杰明·格雷厄姆',
    profile: {
  title: '价值投资之父',
  desc: '《证券分析》与《聪明的投资者》作者，现代价值投资的奠基人。经历1929年大崩溃后系统化构建投资理论，培养出巴菲特等众多投资大师，其思想影响了整整一代投资人。',
  principles: ['安全边际：以远低于内在价值的价格买入', '市场先生是你的仆人，不是你的老师', '投资与投机有本质区别，要清楚自己在做什么', '内在价值基于资产和盈利能力，与股价无关', '分散投资，至少持有10至30只股票', '不要试图预测市场时机']
},
    prompt:`你是本杰明·格雷厄姆，价值投资之父，巴菲特的老师。根据《聪明的投资者》及《证券分析》回答问题。核心理念：安全边际、市场先生寓言、投资与投机的区别、定量分析、分散投资、不预测市场。说话风格：学院派严谨，引用数据，强调原则。用中文回答，200字以内，像真实对话，不用列表。`
  }
];

let currentInvestor = investors[0];
let currentChatId = null;
let isLoading = false;

function loadChats(){return JSON.parse(localStorage.getItem('vm_chats2')||'{}');}
function saveChats(c){localStorage.setItem('vm_chats2',JSON.stringify(c));}
function getTodayKey(){return 'vm_count_'+new Date().toISOString().slice(0,10);}
function getCount(){return parseInt(localStorage.getItem(getTodayKey())||'0');}
function addCount(){localStorage.setItem(getTodayKey(),getCount()+1);}

function checkLimit(){
  if(getCount()>=DAILY_LIMIT){
    document.getElementById('limitTip').style.display='block';
    document.getElementById('input').disabled=true;
    document.getElementById('sendBtn').disabled=true;
    return false;
  }
  return true;
}

function newChat(investorId){
  const inv = investorId ? investors.find(i=>i.id===investorId) : currentInvestor;
  currentInvestor = inv;
  const id = Date.now().toString();
  const chats = loadChats();
  chats[id] = {id, investorId:inv.id, title:'新对话', messages:[]};
  saveChats(chats);
  currentChatId = id;
  renderSidebar();
  renderHeader();
  document.getElementById('chat').innerHTML='';
  appendBubble('ai', `你好！我是${inv.fullName}。你可以问我关于投资、企业分析和价值投资理念的问题。`);
  closeSidebar();
  document.getElementById('input').focus();
}

function loadChat(id){
  const chats = loadChats();
  const chat = chats[id];
  if(!chat) return;
  currentChatId = id;
  currentInvestor = investors.find(i=>i.id===chat.investorId)||investors[0];
  renderSidebar();
  renderHeader();
  const chatEl = document.getElementById('chat');
  chatEl.innerHTML='';
  appendBubble('ai', `你好！我是${currentInvestor.fullName}。你可以问我关于投资、企业分析和价值投资理念的问题。`);
  chat.messages.forEach(m => appendBubble(m.role, m.content));
  closeSidebar();
}

function deleteChat(id, e){
  e.stopPropagation();
  const chats = loadChats();
  delete chats[id];
  saveChats(chats);
  if(currentChatId===id){
    const remaining = Object.keys(chats).sort((a,b)=>b-a);
    if(remaining.length>0) loadChat(remaining[0]);
    else newChat();
  } else {
    renderSidebar();
  }
}

function renderSidebar(){
  const chats = loadChats();
  const body = document.getElementById('sidebarBody');
  const grouped = {};
  investors.forEach(inv=>{ grouped[inv.id]=[]; });
  Object.values(chats).sort((a,b)=>b.id-a.id).forEach(c=>{
    if(grouped[c.investorId]) grouped[c.investorId].push(c);
  });

  body.innerHTML = investors.map((inv, idx) => {
    const items = grouped[inv.id]||[];
    const isActive = currentInvestor.id===inv.id;
    return `
      ${idx>0 ? '<div class="sidebar-divider"></div>' : ''}
      <div class="master-section">
        <button class="master-btn ${isActive?'active':''}" onclick="showProfile(investors.find(i=>i.id==='${inv.id}'))"">
          <span class="master-btn-name">${inv.fullName}</span>
        </button>
        ${items.length>0 ? `<div class="chat-list">
          ${items.map(c=>`
            <button class="chat-item ${c.id===currentChatId?'active':''}" onclick="loadChat('${c.id}')">
              <span class="chat-item-title">${c.title}</span>
              <span class="chat-item-del" onclick="deleteChat('${c.id}',event)">✕</span>
            </button>`).join('')}
        </div>` : ''}
      </div>`;
  }).join('');
}

function renderHeader(){
  const el = document.getElementById('headerName');
  if(el) el.textContent = currentInvestor.fullName;
}

function appendBubble(role, text){
  const chat = document.getElementById('chat');
  if(role==='user'){
    chat.innerHTML+=`<div class="row user">
      <span class="name-label">你</span>
      <div class="bubble user">${text}</div>
    </div>`;
  } else {
    chat.innerHTML+=`<div class="row">
      <span class="name-label">${currentInvestor.fullName}</span>
      <div class="bubble ai">${text}</div>
    </div>`;
  }
  chat.scrollTop = chat.scrollHeight;
}

function showProfile(inv){
  currentInvestor = inv;
  renderHeader();
  renderSidebar();
  const chat = document.getElementById('chat');
  chat.innerHTML = `
    <div class="profile-page">
      <div class="profile-tag">${inv.profile.title}</div>
      <div class="profile-name">${inv.fullName}</div>
      <div class="profile-desc">${inv.profile.desc}</div>
      <div class="profile-section-title">核心投资理念</div>
      <div class="profile-principles">
        ${inv.profile.principles.map(p=>`
          <div class="profile-principle">
            <div class="profile-principle-dot"></div>
            <span>${p}</span>
          </div>`).join('')}
      </div>
    </div>`;
}
  
function showTyping(){
  const chat = document.getElementById('chat');
  chat.innerHTML+=`<div class="row" id="typing">
    <span class="name-label">${currentInvestor.fullName}</span>
    <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>`;
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const el = document.getElementById('typing');
  if(el) el.remove();
}

async function send(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text||isLoading) return;
  if(!checkLimit()) return;
  if(!currentChatId){ newChat(); return; }

  isLoading = true;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  const chats = loadChats();
  const currentChat = chats[currentChatId];
  if(!currentChat.messages.length) { document.getElementById('chat').innerHTML=''; }
  appendBubble('user', text);
  showTyping();

  currentChat.messages.push({role:'user', content:text});
  if(currentChat.title==='新对话') currentChat.title = text.slice(0,18);
  saveChats(chats);
  renderSidebar();

  try {
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:currentChat.messages.slice(-10), systemPrompt:currentInvestor.prompt})
    });
    const data = await res.json();
    const reply = data.reply||'抱歉，请稍后再试。';
    removeTyping();
    appendBubble('ai', reply);
    const chats2 = loadChats();
    chats2[currentChatId].messages.push({role:'assistant', content:reply});
    saveChats(chats2);
    addCount();
    checkLimit();
  } catch(e){
    removeTyping();
    appendBubble('ai','网络出现问题，请稍后再试。');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('input').addEventListener('keydown', e=>{
  if(e.key==='Enter') send();
});

// 初始化（用新的存储key，自动清掉旧数据）
const existingChats = loadChats();
const allIds = Object.keys(existingChats).sort((a,b)=>b-a);
if(allIds.length>0) loadChat(allIds[0]);
else showProfile(investors[0]);
checkLimit();
</script>
</body>
</html>
