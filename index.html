<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>价值大师</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#f2f2f2;height:100vh;display:flex;justify-content:center;align-items:center;}
.app{background:#fff;width:100%;max-width:900px;height:100vh;max-height:100vh;display:flex;overflow:hidden;}

/* 侧边栏 */
.sidebar{width:220px;flex-shrink:0;border-right:1px solid #f2f2f2;display:flex;flex-direction:column;background:#fafafa;}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid #f2f2f2;}
.brand{font-size:16px;font-weight:500;color:#1a1a1a;}
.brand span{color:#e05a5a;}
.sidebar-body{flex:1;overflow-y:auto;padding:12px 10px;}
.sidebar-body::-webkit-scrollbar{width:4px;}
.sidebar-body::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px;}
.master-group{margin-bottom:16px;}
.master-label{font-size:11px;color:#bbb;padding:0 6px;margin-bottom:6px;letter-spacing:0.04em;}
.master-new-btn{width:100%;padding:8px 12px;border-radius:8px;border:1.5px dashed #e8e8e8;background:transparent;cursor:pointer;font-size:12px;color:#ccc;text-align:left;font-family:inherit;margin-bottom:4px;}
.master-new-btn:hover{border-color:#e05a5a;color:#e05a5a;}
.chat-item{width:100%;padding:9px 12px;border-radius:8px;cursor:pointer;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;gap:6px;border:none;background:transparent;text-align:left;font-family:inherit;}
.chat-item:hover{background:#f0f0f0;}
.chat-item.active{background:#fde8e8;}
.chat-item-title{font-size:13px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.chat-item.active .chat-item-title{color:#e05a5a;}
.chat-item-del{opacity:0;font-size:12px;color:#ccc;cursor:pointer;flex-shrink:0;}
.chat-item:hover .chat-item-del{opacity:1;}

/* 大师选择卡片 */
.master-chip{width:100%;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;gap:10px;border:none;background:transparent;font-family:inherit;}
.master-chip:hover .chip-inner{background:#f0f0f0;}
.master-chip.active .chip-inner{background:#fde8e8;}
.chip-inner{width:100%;padding:10px 14px;border-radius:10px;display:flex;align-items:center;gap:10px;transition:background 0.15s;}
.chip-avatar{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
.chip-name{font-size:13px;color:#333;font-weight:400;}
.master-chip.active .chip-name{color:#e05a5a;font-weight:500;}

/* 主区域 */
.main{flex:1;display:flex;flex-direction:column;min-width:0;}
.main-header{padding:16px 20px;border-bottom:1px solid #f2f2f2;display:flex;align-items:center;gap:12px;}
.menu-btn{width:32px;height:32px;border-radius:50%;background:#f7f7f7;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.header-avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
.header-info{flex:1;}
.header-name{font-size:14px;font-weight:500;color:#1a1a1a;}
.header-sub{font-size:11px;color:#bbb;margin-top:1px;}
.new-btn{padding:7px 14px;border-radius:20px;border:1px solid #f0f0f0;background:#fff;font-size:12px;color:#888;cursor:pointer;font-family:inherit;}
.new-btn:hover{border-color:#e05a5a;color:#e05a5a;}

/* 聊天区 */
.chat{flex:1;padding:24px 20px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}
.chat::-webkit-scrollbar{width:4px;}
.chat::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px;}
.row{display:flex;gap:10px;align-items:flex-start;}
.row.user{flex-direction:row-reverse;}
.av{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;}
.av.user-av{background:#f5f5f5;}
.col{display:flex;flex-direction:column;gap:4px;max-width:75%;}
.col.user{align-items:flex-end;}
.name-label{font-size:11px;color:#bbb;padding:0 2px;}
.bubble{padding:12px 16px;font-size:14px;line-height:1.8;border-radius:18px;}
.bubble.ai{background:#f7f7f7;color:#1a1a1a;border-top-left-radius:4px;}
.bubble.user{background:#e05a5a;color:#fff;border-top-right-radius:4px;}
.typing{display:flex;gap:5px;padding:13px 17px;background:#f7f7f7;border-radius:4px 18px 18px 18px;width:fit-content;}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc;animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* 输入区 */
.input-area{padding:12px 20px 20px;border-top:1px solid #f2f2f2;}
.limit-tip{font-size:12px;color:#e05a5a;text-align:center;padding:6px;display:none;}
.input-wrap{display:flex;align-items:center;gap:10px;background:#f7f7f7;border-radius:28px;padding:9px 9px 9px 17px;}
.chat-input{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:#1a1a1a;font-family:inherit;}
.chat-input::placeholder{color:#ccc;}
.send-btn{width:34px;height:34px;border-radius:50%;background:#e05a5a;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.send-btn:disabled{background:#f0b0b0;cursor:not-allowed;}
.disclaimer{font-size:10px;color:#ccc;text-align:center;margin-top:8px;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:10;}
@media(max-width:600px){
  .sidebar{position:fixed;left:0;top:0;height:100%;z-index:20;transform:translateX(-100%);transition:transform 0.3s;}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:flex;}
  .overlay.show{display:block;}
}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="app">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">价值大师<span>·</span></div>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
  </div>

  <div class="main">
    <div class="main-header">
      <button class="menu-btn" onclick="openSidebar()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-avatar" id="headerAvatar"></div>
      <div class="header-info">
        <div class="header-name" id="headerName"></div>
        <div class="header-sub">价值投资大师</div>
      </div>
      <button class="new-btn" onclick="newChat()">+ 新对话</button>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
      <div class="limit-tip" id="limitTip">今日提问次数已用完，明天再来 👋</div>
      <div class="input-wrap">
        <input class="chat-input" id="input" type="text" placeholder="向大师提问…" />
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="disclaimer">基于公开资料模拟 · 不构成投资建议</div>
    </div>
  </div>
</div>

<script>
const DAILY_LIMIT = 20;

const investors = [
  {
    id:'buffett', name:'巴菲特', fullName:'沃伦·巴菲特',
    color:'#e05a5a', bg:'#fde8e8',
    prompt:`你是沃伦·巴菲特，伯克希尔·哈撒韦董事长。根据历年股东信、年会问答及公开访谈回答问题。核心理念：能力圈、护城河、合理价格买优秀企业、长期持有、别人贪婪时恐惧、不亏损是第一原则、专注基本面、管理层诚信最重要。说话风格：通俗比喻，幽默风趣。用中文回答，200字以内，像真实对话，不用列表。`
  },
  {
    id:'duan', name:'段永平', fullName:'段永平',
    color:'#27ae60', bg:'#d5f5e3',
    prompt:`你是段永平，步步高系创始人，价值投资者。根据雪球发帖及公开访谈回答问题。核心理念：投资就是投生意、本分、Stop doing list、只投看懂的、长期持有、不用杠杆、犯错及时止损。说话风格：直接务实，从商业角度看问题。用中文回答，200字以内，像真实对话，不用列表。`
  },
  {
    id:'munger', name:'芒格', fullName:'查理·芒格',
    color:'#d4a017', bg:'#fef9e7',
    prompt:`你是查理·芒格，伯克希尔副董事长。根据《穷查理宝典》及年会问答回答问题。核心理念：多元思维模型、反过来想、人类误判心理学、集中投资、等待好机会、激励机制、终身学习。说话风格：直接犀利，幽默带讽刺，用多学科知识。用中文回答，200字以内，像真实对话，不用列表。`
  },
  {
    id:'lynch', name:'彼得·林奇', fullName:'彼得·林奇',
    color:'#2980b9', bg:'#d6eaf8',
    prompt:`你是彼得·林奇，富达麦哲伦基金前经理。根据《彼得·林奇的成功投资》及访谈回答问题。核心理念：买你了解的、日常发现机会、PEG比率、业余投资者有优势、定期检查持仓故事。说话风格：热情平易，充满具体案例。用中文回答，200字以内，像真实对话，不用列表。`
  },
  {
    id:'graham', name:'格雷厄姆', fullName:'本杰明·格雷厄姆',
    color:'#8e44ad', bg:'#e8daef',
    prompt:`你是本杰明·格雷厄姆，价值投资之父，巴菲特的老师。根据《聪明的投资者》及《证券分析》回答问题。核心理念：安全边际、市场先生寓言、投资与投机的区别、定量分析、分散投资、不预测市场。说话风格：学院派严谨，引用数据，强调原则。用中文回答，200字以内，像真实对话，不用列表。`
  }
];

let currentInvestor = investors[0];
let currentChatId = null;
let isLoading = false;

function loadChats(){return JSON.parse(localStorage.getItem('vm_chats')||'{}');}
function saveChats(c){localStorage.setItem('vm_chats',JSON.stringify(c));}
function getTodayKey(){return 'vm_count_'+new Date().toISOString().slice(0,10);}
function getCount(){return parseInt(localStorage.getItem(getTodayKey())||'0');}
function addCount(){localStorage.setItem(getTodayKey(),getCount()+1);}

function checkLimit(){
  if(getCount()>=DAILY_LIMIT){
    document.getElementById('limitTip').style.display='block';
    document.getElementById('input').disabled=true;
    document.getElementById('sendBtn').disabled=true;
    return false;
  }
  return true;
}

function avatarHtml(inv, size=34, radius=8){
  return `<div style="width:${size}px;height:${size}px;border-radius:${radius}px;background:${inv.bg};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:${inv.color};flex-shrink:0;">${inv.name}</div>`;
}

function newChat(investorId){
  const inv = investorId ? investors.find(i=>i.id===investorId) : currentInvestor;
  currentInvestor = inv;
  const id = Date.now().toString();
  const chats = loadChats();
  chats[id] = {id, investorId:inv.id, title:'新对话', messages:[]};
  saveChats(chats);
  currentChatId = id;
  renderSidebar();
  renderHeader();
  document.getElementById('chat').innerHTML='';
  appendBubble('ai', `你好！我是${inv.fullName}。你可以问我关于投资、企业分析和价值投资理念的问题。`);
  closeSidebar();
  document.getElementById('input').focus();
}

function loadChat(id){
  const chats = loadChats();
  const chat = chats[id];
  if(!chat) return;
  currentChatId = id;
  currentInvestor = investors.find(i=>i.id===chat.investorId)||investors[0];
  renderSidebar();
  renderHeader();
  const chatEl = document.getElementById('chat');
  chatEl.innerHTML='';
  appendBubble('ai', `你好！我是${currentInvestor.fullName}。你可以问我关于投资、企业分析和价值投资理念的问题。`);
  chat.messages.forEach(m => appendBubble(m.role, m.content));
  closeSidebar();
}

function deleteChat(id, e){
  e.stopPropagation();
  const chats = loadChats();
  delete chats[id];
  saveChats(chats);
  if(currentChatId===id){
    currentChatId = null;
    document.getElementById('chat').innerHTML='';
    newChat();
  }
  renderSidebar();
}

function renderSidebar(){
  const chats = loadChats();
  const body = document.getElementById('sidebarBody');
  const grouped = {};
  investors.forEach(inv=>{ grouped[inv.id]=[]; });
  Object.values(chats).sort((a,b)=>b.id-a.id).forEach(c=>{
    if(grouped[c.investorId]) grouped[c.investorId].push(c);
  });

  body.innerHTML = investors.map(inv => {
    const items = grouped[inv.id]||[];
    const chipActive = currentInvestor.id===inv.id ? 'active' : '';
    return `
      <div style="margin-bottom:4px;">
        <button class="master-chip ${chipActive}" onclick="newChat('${inv.id}')">
          <div class="chip-inner">
            ${avatarHtml(inv, 32, 8)}
            <span class="chip-name">${inv.fullName}</span>
          </div>
        </button>
        ${items.map(c=>`
          <div style="padding-left:12px;">
            <button class="chat-item ${c.id===currentChatId?'active':''}" onclick="loadChat('${c.id}')">
              <span class="chat-item-title">· ${c.title}</span>
              <span class="chat-item-del" onclick="deleteChat('${c.id}',event)">✕</span>
            </button>
          </div>`).join('')}
      </div>`;
  }).join('');
}

function renderHeader(){
  const el = document.getElementById('headerAvatar');
  el.style.cssText = `width:34px;height:34px;border-radius:8px;background:${currentInvestor.bg};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:${currentInvestor.color};flex-shrink:0;`;
  el.textContent = currentInvestor.name;
  document.getElementById('headerName').textContent = currentInvestor.fullName;
}

function appendBubble(role, text){
  const chat = document.getElementById('chat');
  const inv = currentInvestor;
  if(role==='user'){
    chat.innerHTML+=`<div class="row user">
      <div class="av user-av">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <div class="col user">
        <span class="name-label">你</span>
        <div class="bubble user">${text}</div>
      </div>
    </div>`;
  } else {
    chat.innerHTML+=`<div class="row">
      <div style="width:34px;height:34px;border-radius:8px;background:${inv.bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:${inv.color};flex-shrink:0;">${inv.name}</div>
      <div class="col">
        <span class="name-label">${inv.fullName}</span>
        <div class="bubble ai">${text}</div>
      </div>
    </div>`;
  }
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
  const chat = document.getElementById('chat');
  const inv = currentInvestor;
  chat.innerHTML+=`<div class="row" id="typing">
    <div style="width:34px;height:34px;border-radius:8px;background:${inv.bg};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:${inv.color};flex-shrink:0;">${inv.name}</div>
    <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>`;
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const el = document.getElementById('typing');
  if(el) el.remove();
}

async function send(){
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text||isLoading) return;
  if(!checkLimit()) return;
  if(!currentChatId) { newChat(); return; }

  isLoading = true;
  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  appendBubble('user', text);
  showTyping();

  const chats = loadChats();
  const chat = chats[currentChatId];
  chat.messages.push({role:'user', content:text});
  if(chat.title==='新对话') chat.title = text.slice(0,18);
  saveChats(chats);
  renderSidebar();

  try {
    const history = chat.messages.slice(-10);
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history, systemPrompt:currentInvestor.prompt})
    });
    const data = await res.json();
    const reply = data.reply||'抱歉，请稍后再试。';
    removeTyping();
    appendBubble('ai', reply);
    const chats2 = loadChats();
    chats2[currentChatId].messages.push({role:'assistant', content:reply});
    saveChats(chats2);
    addCount();
    checkLimit();
  } catch(e){
    removeTyping();
    appendBubble('ai','网络出现问题，请稍后再试。');
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('input').addEventListener('keydown', e=>{
  if(e.key==='Enter') send();
});

// 初始化
const existingChats = loadChats();
const allIds = Object.keys(existingChats).sort((a,b)=>b-a);
if(allIds.length>0){
  loadChat(allIds[0]);
} else {
  newChat();
}
checkLimit();
</script>
</body>
</html>
